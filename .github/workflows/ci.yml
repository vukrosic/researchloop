name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm install

      - name: Smoke
        run: npm run smoke

      - name: Goal
        run: npm run test:goal

      - name: Idea
        run: npm run test:idea

      - name: Dashboard
        run: npm run test:dashboard

      - name: Compare
        run: npm run test:compare

      - name: Setup
        run: npm run test:setup

      - name: Prompts
        run: npm run test:prompts

      - name: Focus prompts
        run: npm run test:focus-prompts

      - name: Site
        run: npm run test:site

      - name: Smoke e2e
        run: npm run smoke:e2e
